<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="img/favico4.png" type="image/x-icon">
    <title>checkout - Meu Brechó</title>
</head>
<body>

    <header>
        <h1>Meu Brechó</h1>
        <p>Finalização do pedido</p>
    </header>

    <main class="checkout">      
        
        <section class="dados-cliente">
            <h2>Dados do Cliente</h2>

            <form>

                <div class="campo">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" placeholder="Digite seu nome">
                </div>

                <div class="campo">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="Digite seu e-mail">
                </div>

                <div class="campo">
                    <label for="telefone">Telefone</label>
                    <input type="tel" id="telefone" placeholder="(00)00000-0000">
                </div>
            </form>

        </section>
        <section class="endereco-entrega">
            <h2>Endereço de Entrega</h2>

            <div class="campo">
                <label for="cep">CEP</label>
                <input type="text" id="cep" placeholder="00000-000">
            </div>
            <div class="campo">
                <label for="rua">Rua</label>
                <input type="text" id="rua" placeholder="Digite sua rua">                
            </div>
            <div class="campo">
                <label for="numero">Número</label>
                <input type="text" id="numero" placeholder="Número">
            </div>
            <div class="campo">
                <label for="bairro">Bairro</label>
                <input type="text" id="bairro" placeholder="Bairro">
            </div>
            <div class="campo">
                <label for="cidade">Cidade</label>
                <input type="text" id="cidade" placeholder="Cidade">
            </div>
            <div class="campo">
                <label for="estado">Estado</label>
                <input type="text" id="estado" placeholder="UF">
            </div>

        </section>

        <section class="forma-pagamento">
            <h2>Forma de Pagamento</h2>

            <div class="opcao-pagamento">
                <input type="radio" id="pix" name="pagamento" value="Pix">
                <label for="pix">PIX</label>
            </div>
            <div class="opcao-pagamento">
                <input type="radio" id="credito" name="pagamento" value="credito">
                <label for="credito">Cartão de Crédito</label>
            </div>
            <div class="opcao-pagamento">
                <input type="radio" id="boleto" name="pagamento" value="boleto">
                <label for="boleto">Boleto Bancário</label>
            </div>

        </section>

        <section class="resumo-pedido">
            <h2>Resumo do Pedido</h2>

            <div id="lista-checkout">

            </div>

            <h3 id="total-checkout">
                Total: R$ 0,00
            </h3>

        </section>
        <section class="Finalizar-compra">

            <button id="btn-finalizar">
                Finalizar Pedido
            </button>
            
        </section>


    </main>

    <footer>
        <p>&copy; 2026 Meu Brechó - Todos os direitos reservados</p>
    </footer>

    <script src="checkout.js"></script>
    
</body>
</html>
