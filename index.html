<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Meu-Brechó</title>
</head>

<body>

    <header>
        <h1>Meu Brechó</h1>
        <p>Moda bonita com preço baixo</p>       
    </header>

    <main>
        <section class="produtos">

            <article class="produto">
                <img src="img/camisa.png" alt="">
                <h2>Camisa</h2>
                <p> R$39,90 </p>
                <p>Camisa em algodão, tamanho M</p>

                <button class="btn-comprar">Comprar</button>

            </article>

            <article class="produto">
                <img src="img/calça jeans1.png" alt="">
                <h2>Calça Jeans</h2>
                <p> R$69,90 </p>
                <p>Calça Jeans, tamanho M</p>

                <button class="btn-comprar">Comprar</button>

            </article>

            <article class="produto">
                <img src="img/blusa1.png" alt="">
                <h2>Blusa</h2>
                <p> R$49,90 </p>
                <p>Blusa elegante, tamanho M</p>

                <button class="btn-comprar">Comprar</button>

            </article>

        </section>
    </main>

</body>
</html>
