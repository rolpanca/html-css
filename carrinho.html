<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Carrinho - Brechó</title>
</head>
<body>

    <header>
        <h1>Meu Brechó</h1>
        <p>Seu carrinho de compras</p>
    </header>

    <main class="pagina-carrinho">

        <h2>Produtos no Carrinho</h2>

        <div class="item-carrinho">
            <img src="img/camisa.png" alt="Camisa">

            <div class="info-carrinho">
                <h3>Camisa</h3>
                <p>Tamanho</p>
                <p>Quantidade: 1</p>
                <p class="preco">R$39,90</p>
            </div>

            <button class="btn-remover">Remover</button>

        </div>

        <div class="item-carrinho">

            <img src="img/blusa1.png" alt="Blusa">

            <div class="info-carrinho">
                <h3>Blusa</h3>
                <p>Tamanho</p>
                <p>Quantidade: 1</p>
                <p class="preco">R$49,90</p>            

            </div>

            <button class="btn-remover">Remover</button>

            </div>

            <div class="resumo-carrinho">
                <h3>Total: R$89,80</h3>                

                <a href="checkout.html" class="btn-finalizar">
                    Finalizar Compra
                </a>

        </div>       

    </main>

    <footer>
        <p>&copy; 2026 Meu Brechó - Todos os direito reservados</p>
    </footer>
    
</body>
</html>
